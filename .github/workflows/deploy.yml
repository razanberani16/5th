# ============================================================
# DEPLOY TO AWS S3 + CLOUDFRONT - GitHub Actions Workflow
# ============================================================
# This workflow automatically uploads our static website
# to an Amazon S3 bucket and invalidates the CloudFront
# cache whenever we push code to main.
# It uses OIDC (OpenID Connect) to securely authenticate
# with AWS — no secret access keys needed!
# ============================================================

# --- WORKFLOW NAME ---
# This is the display name shown in the GitHub Actions tab
name: Deploy to S3 + CloudFront

# --- TRIGGERS ---
# "on" defines WHEN this workflow runs
on:
  push:                        # Trigger when code is pushed...
    branches: [ main ]         # ...but ONLY to the "main" branch (not feature branches)
  workflow_dispatch:           # Also allow manual trigger via "Run workflow" button in GitHub UI

# --- PERMISSIONS ---
# These control what the workflow's GITHUB_TOKEN is allowed to do
permissions:
  id-token: write              # REQUIRED: Lets GitHub generate an OIDC token (a short-lived identity proof)
                               # This token is sent to AWS to prove "I am this GitHub repo"
                               # Without this, the IAM Role assumption FAILS
  contents: read               # Allows the workflow to read/clone the repository code

# --- ENVIRONMENT VARIABLES ---
# Reusable variables available to ALL jobs and steps in this workflow
env:
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}                       # The bucket name, stored as a GitHub Secret for security
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}  # The CloudFront Distribution ID, stored as a GitHub Secret

# --- JOBS ---
# A workflow is made up of one or more jobs that run in parallel by default
jobs:
  deploy-to-s3-cloudfront:             # Job ID (used internally by GitHub Actions)
    name: Deploy to S3 + Invalidate CloudFront   # Display name shown in the Actions UI
    runs-on: ubuntu-latest             # Use a GitHub-hosted Ubuntu runner (free Linux VM)

    # --- STEPS ---
    # Steps run sequentially, one after another, inside this job
    steps:

      # STEP 1: Checkout the repository code
      # Without this, the runner has an empty workspace — no files to deploy!
      - name: Checkout code
        uses: actions/checkout@v6  # Official GitHub action to clone our repo onto the runner

      # STEP 2: Authenticate with AWS using OIDC (no static keys!)
      # This is where the magic happens:
      #   1. GitHub generates an OIDC token (thanks to id-token: write permission)
      #   2. The token is sent to AWS STS (Security Token Service)
      #   3. AWS checks the token against the IAM Role's trust policy
      #   4. If it matches our repo, AWS gives us temporary credentials
      - name: Configure AWS Credentials (Assume IAM Role via OIDC)
        uses: aws-actions/configure-aws-credentials@v6   # Official AWS action for OIDC auth (Node.js 24)
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}     # The IAM Role ARN, stored as a GitHub Secret
          aws-region: us-east-1                            # AWS region (S3 works from any region)

      # STEP 3: Verify we successfully authenticated
      # "aws sts get-caller-identity" shows WHO we are in AWS (the assumed role)
      # This is optional but great for debugging — if auth fails, you'll see it here
      - name: Verify AWS Identity
        run: |
          echo "✅ Successfully assumed IAM Role"
          aws sts get-caller-identity

      # STEP 4: Upload the website files to S3
      # "aws s3 sync" works like rsync — only uploads files that changed
      - name: Sync website files to S3
        run: |
          echo "🚀 Deploying to S3 bucket: $S3_BUCKET"
          aws s3 sync . s3://$S3_BUCKET \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "LICENSE"
          echo "✅ S3 deployment complete!"
          # --delete     = Remove files from S3 that no longer exist locally (keeps bucket clean)
          # --exclude    = Skip files we don't want on the website (git files, workflows, docs)
          # s3 sync      = Only uploads NEW or CHANGED files (faster than copying everything)

      # STEP 5: Invalidate the CloudFront cache
      # After uploading new files to S3, CloudFront may still serve the OLD cached versions
      # from its 450+ edge locations. We need to tell CloudFront to clear its cache
      # so users immediately see the updated website.
      # "/*" means invalidate ALL files — you could also target specific paths like "/index.html"
      - name: Invalidate CloudFront Cache
        run: |
          echo "🔄 Invalidating CloudFront distribution: $CLOUDFRONT_DISTRIBUTION_ID"
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
          echo "✅ CloudFront cache invalidation started!"
          # Note: Invalidation typically completes within 1-2 minutes across all edge locations
          # "/*" invalidates everything — for large sites, you can target specific changed files
          # AWS gives you 1,000 free invalidation paths per month (/* counts as 1 path)
